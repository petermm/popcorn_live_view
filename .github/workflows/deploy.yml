name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "26.0"
          elixir-version: "1.17.3"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Cache _build
        uses: actions/cache@v4
        with:
          path: _build
          key: ${{ runner.os }}-build-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-build-

      - name: mix setup
        run: mix setup
        env:
          SCRIPT_NAME: /popcorn_live_view

      - name: Patch vendored Popcorn bundle path
        run: |
          set -euo pipefail
          target="static/wasm/popcorn.js"
          test -f "$target"
          node -e 'const fs=require("fs");const p=process.argv[1];const from="${\"../\" + this._bundlePath}";const to="${\"/\" + this._bundlePath.replace(/^\\/+/, \"\")}";const src=fs.readFileSync(p,"utf8");if(!src.includes(from)){throw new Error("Expected bundle-path pattern not found in "+p)};fs.writeFileSync(p, src.replace(from,to));' "$target"
          grep -n 'meta name="bundle-path"' "$target"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
